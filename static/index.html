<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Churn Risk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --header-bg: #1e2530;
    --header-text: #ffffff;
    --header-subtitle: #9aa3b2;

    --bg: #f4f5f7;
    --card-bg: #faf9f6;
    --border: #d8d3c7;
    --text: #262421;
    --text-muted: #6b6659;

    --accent: #d97706;
    --accent-dark: #b45309;

    --teal: #0d9488;
    --amber: #d97706;
    --coral: #dc2626;

    --low: #0d9488;
    --medium: #d97706;
    --high: #dc2626;

    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
  }

  header {
    background: var(--header-bg);
    color: var(--header-text);
    padding: 36px 20px 32px;
    text-align: center;
  }

  header h1 {
    font-size: 1.7rem;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }

  header p {
    margin: 0;
    color: var(--header-subtitle);
    font-size: 0.95rem;
  }

  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    box-shadow: 0 1px 3px rgba(30, 37, 48, 0.05), 0 8px 24px rgba(30, 37, 48, 0.06);
  }

  .card + .card {
    margin-top: 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px 20px;
  }

  @media (max-width: 520px) {
    .grid { grid-template-columns: 1fr; }
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field.checkbox {
    flex-direction: row;
    align-items: center;
    gap: 10px;
    padding-top: 22px;
  }

  label {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-muted);
  }

  select, input[type="number"] {
    font-size: 0.95rem;
    padding: 9px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #ffffff;
    color: var(--text);
    font-family: inherit;
  }

  select:focus, input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.18);
  }

  select:focus-visible, input:focus-visible, button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--accent);
  }

  .submit-row {
    margin-top: 24px;
  }

  button {
    width: 100%;
    padding: 13px 20px;
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  button:hover { background: var(--accent-dark); }
  button:disabled { background: #b7ae9c; cursor: not-allowed; }

  #result-area {
    margin-top: 20px;
  }

  .result-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .gauge-wrap {
    position: relative;
    width: 220px;
    height: 220px;
  }

  .gauge-svg {
    display: block;
    width: 220px;
    height: 220px;
  }

  .gauge-track {
    fill: none;
    stroke: #e7e2d5;
    stroke-width: 14;
    stroke-linecap: round;
  }

  .gauge-progress {
    fill: none;
    stroke: url(#gaugeGradient);
    stroke-width: 14;
    stroke-linecap: round;
    transition: stroke-dashoffset 800ms cubic-bezier(0.16, 1, 0.3, 1);
  }

  .gauge-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .gauge-percent {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 2.1rem;
    color: var(--text);
  }

  .gauge-risk-label {
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .baseline-marker {
    width: 100%;
    max-width: 320px;
    margin-top: 6px;
  }

  .baseline-track {
    position: relative;
    height: 4px;
    border-radius: 4px;
    background: #e7e2d5;
    margin-bottom: 10px;
  }

  .baseline-tick {
    position: absolute;
    top: -4px;
    width: 2px;
    height: 12px;
    background: var(--text-muted);
    transform: translateX(-50%);
  }

  .baseline-label {
    text-align: center;
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  .baseline-label .mono {
    font-family: var(--mono);
    font-weight: 500;
    color: var(--text);
  }

  .interpretation {
    margin-top: 18px;
    text-align: center;
    font-size: 0.95rem;
    color: var(--text-muted);
    max-width: 380px;
  }

  .error-card {
    border-left: 4px solid var(--high);
    background: #fdf1ef;
    color: #9a2e21;
    font-size: 0.9rem;
  }

  .hidden { display: none; }
</style>
</head>
<body>
  <header>
    <h1>Customer Churn Risk</h1>
    <p>Estimate how likely a customer is to churn from their account details.</p>
  </header>

  <div class="page">
    <form id="churn-form" class="card">
      <div class="grid">
        <div class="field">
          <label for="gender">Gender</label>
          <select id="gender" name="gender">
            <option value="Female" selected>Female</option>
            <option value="Male">Male</option>
          </select>
        </div>

        <div class="field checkbox">
          <input type="checkbox" id="SeniorCitizen" name="SeniorCitizen">
          <label for="SeniorCitizen" style="padding-top:0;">Senior Citizen</label>
        </div>

        <div class="field">
          <label for="Partner">Partner</label>
          <select id="Partner" name="Partner">
            <option value="Yes" selected>Yes</option>
            <option value="No">No</option>
          </select>
        </div>

        <div class="field">
          <label for="Dependents">Dependents</label>
          <select id="Dependents" name="Dependents">
            <option value="Yes">Yes</option>
            <option value="No" selected>No</option>
          </select>
        </div>

        <div class="field">
          <label for="tenure">Tenure (months)</label>
          <input type="number" id="tenure" name="tenure" value="12" min="0" step="1" required>
        </div>

        <div class="field">
          <label for="PhoneService">Phone Service</label>
          <select id="PhoneService" name="PhoneService">
            <option value="Yes" selected>Yes</option>
            <option value="No">No</option>
          </select>
        </div>

        <div class="field">
          <label for="MultipleLines">Multiple Lines</label>
          <select id="MultipleLines" name="MultipleLines">
            <option value="Yes">Yes</option>
            <option value="No" selected>No</option>
          </select>
        </div>

        <div class="field">
          <label for="InternetService">Internet Service</label>
          <select id="InternetService" name="InternetService">
            <option value="DSL">DSL</option>
            <option value="Fiber optic" selected>Fiber optic</option>
            <option value="No">No</option>
          </select>
        </div>

        <div class="field">
          <label for="OnlineSecurity">Online Security</label>
          <select id="OnlineSecurity" name="OnlineSecurity">
            <option value="Yes">Yes</option>
            <option value="No" selected>No</option>
          </select>
        </div>

        <div class="field">
          <label for="OnlineBackup">Online Backup</label>
          <select id="OnlineBackup" name="OnlineBackup">
            <option value="Yes" selected>Yes</option>
            <option value="No">No</option>
          </select>
        </div>

        <div class="field">
          <label for="DeviceProtection">Device Protection</label>
          <select id="DeviceProtection" name="DeviceProtection">
            <option value="Yes">Yes</option>
            <option value="No" selected>No</option>
          </select>
        </div>

        <div class="field">
          <label for="TechSupport">Tech Support</label>
          <select id="TechSupport" name="TechSupport">
            <option value="Yes">Yes</option>
            <option value="No" selected>No</option>
          </select>
        </div>

        <div class="field">
          <label for="StreamingTV">Streaming TV</label>
          <select id="StreamingTV" name="StreamingTV">
            <option value="Yes" selected>Yes</option>
            <option value="No">No</option>
          </select>
        </div>

        <div class="field">
          <label for="StreamingMovies">Streaming Movies</label>
          <select id="StreamingMovies" name="StreamingMovies">
            <option value="Yes">Yes</option>
            <option value="No" selected>No</option>
          </select>
        </div>

        <div class="field">
          <label for="Contract">Contract</label>
          <select id="Contract" name="Contract">
            <option value="Month-to-month" selected>Month-to-month</option>
            <option value="One year">One year</option>
            <option value="Two year">Two year</option>
          </select>
        </div>

        <div class="field">
          <label for="PaperlessBilling">Paperless Billing</label>
          <select id="PaperlessBilling" name="PaperlessBilling">
            <option value="Yes" selected>Yes</option>
            <option value="No">No</option>
          </select>
        </div>

        <div class="field">
          <label for="PaymentMethod">Payment Method</label>
          <select id="PaymentMethod" name="PaymentMethod">
            <option value="Electronic check" selected>Electronic check</option>
            <option value="Mailed check">Mailed check</option>
            <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
            <option value="Credit card (automatic)">Credit card (automatic)</option>
          </select>
        </div>

        <div class="field">
          <label for="MonthlyCharges">Monthly Charges ($)</label>
          <input type="number" id="MonthlyCharges" name="MonthlyCharges" value="70.70" min="0" step="0.01" required>
        </div>

        <div class="field">
          <label for="TotalCharges">Total Charges ($)</label>
          <input type="number" id="TotalCharges" name="TotalCharges" value="848.40" min="0" step="0.01" required>
        </div>
      </div>

      <div class="submit-row">
        <button type="submit" id="submit-btn">Predict churn risk</button>
      </div>
    </form>

    <div id="result-area"></div>
  </div>

<script>
  const form = document.getElementById("churn-form");
  const submitBtn = document.getElementById("submit-btn");
  const resultArea = document.getElementById("result-area");

  const RADIUS = 80;
  const CIRCUMFERENCE = 2 * Math.PI * RADIUS;
  const ARC_FRACTION = 0.75; // 270 degrees of the full circle
  const ARC_LENGTH = CIRCUMFERENCE * ARC_FRACTION;
  const AVERAGE_CHURN_RATE = 0.265;

  const riskColors = { Low: "var(--low)", Medium: "var(--medium)", High: "var(--high)" };
  const interpretations = {
    Low: "This customer is unlikely to churn — no action needed.",
    Medium: "This customer shows some churn risk — consider proactive engagement.",
    High: "This customer is at high risk of churning — prioritize retention outreach."
  };

  function gaugeMarkup() {
    return `
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="gaugeGradient" gradientUnits="userSpaceOnUse" x1="30" y1="170" x2="170" y2="170">
              <stop offset="0%" stop-color="#0d9488" />
              <stop offset="50%" stop-color="#d97706" />
              <stop offset="100%" stop-color="#dc2626" />
            </linearGradient>
          </defs>
          <circle class="gauge-track" cx="100" cy="100" r="${RADIUS}"
            stroke-dasharray="${ARC_LENGTH} ${CIRCUMFERENCE}"
            transform="rotate(-225 100 100)"></circle>
          <circle id="gauge-progress" class="gauge-progress" cx="100" cy="100" r="${RADIUS}"
            stroke-dasharray="${ARC_LENGTH} ${CIRCUMFERENCE}"
            stroke-dashoffset="${ARC_LENGTH}"
            transform="rotate(-225 100 100)"></circle>
        </svg>
        <div class="gauge-center">
          <div id="gauge-percent" class="gauge-percent">0%</div>
          <div id="gauge-risk-label" class="gauge-risk-label"></div>
        </div>
      </div>
      <div class="baseline-marker">
        <div class="baseline-track">
          <div class="baseline-tick" style="left: ${AVERAGE_CHURN_RATE * 100}%;"></div>
        </div>
        <div class="baseline-label">Average churn rate: <span class="mono">${(AVERAGE_CHURN_RATE * 100).toFixed(1)}%</span></div>
      </div>
      <p class="interpretation" id="interpretation-text"></p>
    `;
  }

  function renderResult(data) {
    const probability = Math.min(Math.max(data.churn_probability, 0), 1);
    const pct = (probability * 100).toFixed(1);
    const risk = data.risk_level;

    resultArea.innerHTML = `<div class="card result-card">${gaugeMarkup()}</div>`;

    const percentEl = document.getElementById("gauge-percent");
    const riskLabelEl = document.getElementById("gauge-risk-label");
    const interpretationEl = document.getElementById("interpretation-text");
    const progressCircle = document.getElementById("gauge-progress");

    percentEl.textContent = `${pct}%`;
    percentEl.style.color = riskColors[risk] || "var(--text)";
    riskLabelEl.textContent = `${risk} risk`;
    riskLabelEl.style.color = riskColors[risk] || "var(--text)";
    interpretationEl.textContent = interpretations[risk] || "";

    const targetOffset = ARC_LENGTH - ARC_LENGTH * probability;

    // Force the gauge to animate from empty every time, rather than
    // transitioning from whatever the previous result left it at.
    progressCircle.style.transition = "none";
    progressCircle.style.strokeDashoffset = ARC_LENGTH;
    progressCircle.getBoundingClientRect();
    progressCircle.style.transition = "stroke-dashoffset 800ms cubic-bezier(0.16, 1, 0.3, 1)";
    requestAnimationFrame(() => {
      progressCircle.style.strokeDashoffset = targetOffset;
    });
  }

  function renderError(message) {
    resultArea.innerHTML = `
      <div class="card error-card">
        Could not get a prediction: ${message}
      </div>
    `;
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = "Predicting...";
    resultArea.innerHTML = "";

    const formData = new FormData(form);
    const payload = {
      gender: formData.get("gender"),
      SeniorCitizen: formData.get("SeniorCitizen") ? 1 : 0,
      Partner: formData.get("Partner"),
      Dependents: formData.get("Dependents"),
      tenure: Number(formData.get("tenure")),
      PhoneService: formData.get("PhoneService"),
      MultipleLines: formData.get("MultipleLines"),
      InternetService: formData.get("InternetService"),
      OnlineSecurity: formData.get("OnlineSecurity"),
      OnlineBackup: formData.get("OnlineBackup"),
      DeviceProtection: formData.get("DeviceProtection"),
      TechSupport: formData.get("TechSupport"),
      StreamingTV: formData.get("StreamingTV"),
      StreamingMovies: formData.get("StreamingMovies"),
      Contract: formData.get("Contract"),
      PaperlessBilling: formData.get("PaperlessBilling"),
      PaymentMethod: formData.get("PaymentMethod"),
      MonthlyCharges: Number(formData.get("MonthlyCharges")),
      TotalCharges: Number(formData.get("TotalCharges"))
    };

    try {
      const response = await fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        const errorBody = await response.text();
        throw new Error(`Server returned ${response.status}: ${errorBody}`);
      }

      const data = await response.json();
      renderResult(data);
    } catch (err) {
      renderError(err.message || "Network error, please try again.");
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Predict churn risk";
    }
  });
</script>
</body>
</html>
